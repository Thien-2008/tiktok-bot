<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #0f172a;
  color: white;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 16px;
}

.box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>📦 Tăng Follow TikTok</h2>

<div class="box">

<input id="link" placeholder="🔗 Nhập link TikTok">

<input id="qty" type="number" placeholder="🔢 Số lượng (10 - 100000)" min="10" max="100000">

<p>💰 Giá: <b><span id="price">0</span>$</b></p>

<button onclick="sendData()">🚀 Đặt đơn</button>

</div>

<script>

let pricePer1000 = 2.1;

document.getElementById("qty").oninput = () => {
  let q = document.getElementById("qty").value;
  let price = (q / 1000) * pricePer1000;
  document.getElementById("price").innerText = price.toFixed(2);
}

function sendData(){
  let data = {
    link: document.getElementById("link").value,
    qty: document.getElementById("qty").value,
    price: document.getElementById("price").innerText
  };

  Telegram.WebApp.sendData(JSON.stringify(data));
}

</script>

</body>
</html>
